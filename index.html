<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Neha ❤️</title>

<!-- Premium Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    text-align: center;
    color: white;
    overflow-x: hidden;
}

/* Container */
.container {
    margin: 60px 15px;
    padding: 25px;
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
}

/* Title */
#typing {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
}

/* Message lines */
#loveMessage {
    display: none;
    margin-top: 15px;
}

.line {
    opacity: 0;
    transform: translateY(15px);
    transition: 0.6s;
    font-size: 16px;
    line-height: 1.7;
}

/* Subtitle */
h2 {
    font-family: 'Playfair Display', serif;
}

/* Buttons */
button {
    padding: 10px 22px;
    font-size: 15px;
    border: none;
    border-radius: 30px;
    margin: 8px;
    cursor: pointer;
    transition: 0.3s;
}

#yesBtn {
    background: #ff4d6d;
    color: white;
    box-shadow: 0 4px 15px rgba(255,77,109,0.4);
}

#noBtn {
    background: white;
    color: #ff4d6d;
    position: fixed;
}

#openBtn {
    background: white;
    color: #ff4d6d;
    font-weight: 500;
}

button:hover {
    transform: scale(1.08);
}

/* Celebration */
#celebration {
    display: none;
    margin-top: 120px;
    font-size: 26px;
    font-family: 'Playfair Display', serif;
}

/* Hearts */
.heart {
    position: fixed;
    animation: float 6s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* Mobile */
@media (max-width: 480px) {
    #typing { font-size: 26px; }
    .line { font-size: 14px; }
}
</style>
</head>

<body>

<div class="container">
    <h1 id="typing"></h1>

    <button id="openBtn" onclick="showMessage()">💌 Click Here</button>

    <div id="loveMessage">
        <p class="line">Our friendship is endless ❤️</p>
        <p class="line">Every moment with you feels magical ✨</p>
        <p class="line">You came into my life quietly, but changed everything 💖</p>
    </div>

    <h2>Will You Be My Friend Forever? 💖</h2>

    <button id="yesBtn" onclick="yesClicked()">Yes 💕</button>
    <button id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton()">No 😢</button>
</div>

<div id="celebration">
    💖 She Said YES! 💖<br>
    😍 Best Day Ever 😍
</div>

<script>
// Typing Effect
let text = "For Neha ❤️";
let i = 0;
function typingEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typingEffect, 100);
    }
}
typingEffect();

// Show Message One by One
function showMessage() {
    let container = document.getElementById("loveMessage");
    container.style.display = "block";

    let lines = document.querySelectorAll(".line");

    lines.forEach((line, index) => {
        setTimeout(() => {
            line.style.opacity = "1";
            line.style.transform = "translateY(0)";
        }, index * 1200);
    });
}

// YES Click
function yesClicked() {
    document.querySelector(".container").style.display = "none";
    document.getElementById("celebration").style.display = "block";
}

// Move NO Button
function moveButton() {
    let btn = document.getElementById("noBtn");
    let x = Math.random() * (window.innerWidth - 120);
    let y = Math.random() * (window.innerHeight - 60);
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

// Floating Hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.classList.add("heart");
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 10 + 15) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 400);
</script>

</body>
</html>
