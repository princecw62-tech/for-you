<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Neha ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff7eb3;
            --glass: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: #4a4a4a;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            padding: 40px 20px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            text-align: center;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid white;
            margin-bottom: 15px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #typing {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .message-area {
            min-height: 120px;
            margin: 20px 0;
        }

        .line {
            opacity: 0;
            transform: translateY(10px);
            transition: 0.8s ease;
            margin: 8px 0;
            font-size: 0.95rem;
        }

        /* BUTTONS STYLING */
        .btn-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            position: relative;
            height: 60px; /* Maintains space so card doesn't collapse */
        }

        button {
            padding: 12px 35px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #yesBtn {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.3);
            z-index: 5;
        }

        #noBtn {
            background: white;
            color: var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            z-index: 10; /* Ensures it's interactive */
            white-space: nowrap;
        }

        #openBtn {
            background: white;
            color: var(--primary);
            width: 80%;
            margin: 0 auto;
        }

        button:active { transform: scale(0.95); }

        /* CELEBRATION AREA */
        #celebration {
            display: none;
            animation: popIn 0.6s cubic-bezier(0.17, 0.89, 0.32, 1.27);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .floating-heart {
            position: fixed;
            pointer-events: none;
            z-index: 1;
            animation: floatUp 4s linear forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="https://www.chosic.com/wp-content/uploads/2021/05/Beautiful-Piano.mp3" type="audio/mpeg">
</audio>

<div class="container" id="card">
    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140047.png" alt="Neha" class="profile-img">
    <h1 id="typing"></h1>

    <button id="openBtn" onclick="initiate()">💌 Click to Open</button>

    <div id="mainContent" style="display:none;">
        <div class="message-area">
            <p class="line">Life is colorful with you 🌸</p>
            <p class="line">You make every moment special ✨</p>
            <p class="line">A friend like you is a blessing... 💖</p>
        </div>

        <h3 style="margin-bottom: 20px;">Will you be my friend forever?</h3>

        <div class="btn-wrapper">
            <button id="yesBtn" onclick="celebrate()">Yes! 💕</button>
            <button id="noBtn" onmouseenter="dodge()" ontouchstart="dodge()">No 🥺</button>
        </div>
    </div>

    <div id="celebration">
        <h1 style="font-size: 3.5rem; margin: 0;">🎉</h1>
        <h2 style="font-family: 'Playfair Display'; color: var(--primary);">I knew it! ❤️</h2>
        <p>Best Choice Ever, Neha!</p>
    </div>
</div>

<script>
    // 1. Typing Effect
    const nameText = "For Neha ❤️";
    let i = 0;
    function type() {
        if (i < nameText.length) {
            document.getElementById("typing").innerHTML += nameText.charAt(i);
            i++;
            setTimeout(type, 150);
        }
    }
    type();

    // 2. Start the experience
    function initiate() {
        document.getElementById("bgMusic").play().catch(() => {});
        document.getElementById("openBtn").style.display = "none";
        document.getElementById("mainContent").style.display = "block";

        const lines = document.querySelectorAll('.line');
        lines.forEach((line, idx) => {
            setTimeout(() => {
                line.style.opacity = "1";
                line.style.transform = "translateY(0)";
            }, idx * 1000);
        });
    }

    // 3. FIXED Dodge Logic
    function dodge() {
        const btn = document.getElementById("noBtn");
        
        // Calculate safe boundaries
        const padding = 30;
        const bWidth = btn.offsetWidth;
        const bHeight = btn.offsetHeight;
        
        // Random position within the entire viewport
        const newX = Math.random() * (window.innerWidth - bWidth - padding * 2) + padding;
        const newY = Math.random() * (window.innerHeight - bHeight - padding * 2) + padding;

        // Switch to fixed positioning only when dodging starts
        btn.style.position = "fixed";
        btn.style.left = newX + "px";
        btn.style.top = newY + "px";
    }

    // 4. Celebration Logic
    function celebrate() {
        document.getElementById("mainContent").style.display = "none";
        document.querySelector(".profile-img").style.display = "none";
        document.getElementById("typing").style.display = "none";
        document.getElementById("celebration").style.display = "block";
        
        // Heart explosion
        for(let i=0; i<40; i++) {
            setTimeout(spawnHeart, i * 60);
        }
    }

    function spawnHeart() {
        const heart = document.createElement("div");
        heart.classList.add("floating-heart");
        heart.innerHTML = ["❤️", "💖", "✨", "🌸", "⭐"][Math.floor(Math.random() * 5)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.bottom = "-5vh";
        heart.style.fontSize = (Math.random() * 20 + 20) + "px";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 4000);
    }

    // Background floating hearts
    setInterval(spawnHeart, 800);
</script>

</body>
</html>
