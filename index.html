<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Neha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
    :root {
        --primary-pink: #ff4d6d;
        --soft-pink: #ff7eb3;
        --glass: rgba(255, 255, 255, 0.2);
    }

    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        color: white;
    }

    .container {
        position: relative;
        z-index: 10;
        width: 90%;
        max-width: 450px;
        padding: 40px 20px;
        background: var(--glass);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 20px 50px rgba(0,0,0,0.1);
        text-align: center;
    }

    /* Profile Photo Customization */
    .profile-img {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 4px solid white;
        margin-bottom: 20px;
        object-fit: cover;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    #typing {
        font-family: 'Playfair Display', serif;
        font-size: 2.2rem;
        margin-bottom: 10px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }

    .line {
        opacity: 0;
        transform: translateY(20px);
        transition: 1s ease;
        margin: 15px 0;
        font-weight: 300;
        letter-spacing: 0.5px;
    }

    .btn-group {
        margin-top: 30px;
        display: flex;
        justify-content: center;
        gap: 15px;
        min-height: 50px;
    }

    button {
        padding: 12px 30px;
        border-radius: 50px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    #yesBtn {
        background: var(--primary-pink);
        color: white;
        box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3);
    }

    #noBtn {
        background: white;
        color: var(--primary-pink);
        position: absolute;
    }

    #openBtn {
        background: white;
        color: var(--primary-pink);
        width: 100%;
        font-size: 1.1rem;
    }

    .heart-bg {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        z-index: 1;
    }

    #celebration {
        display: none;
        animation: scaleIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes scaleIn {
        from { transform: scale(0); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }
</style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="https://www.chosic.com/wp-content/uploads/2021/05/Beautiful-Piano.mp3" type="audio/mpeg">
</audio>

<div class="container" id="card">
    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140047.png" alt="Neha" class="profile-img">
    
    <h1 id="typing"></h1>

    <button id="openBtn" onclick="initiate()">💌 Click to Open</button>

    <div id="content" style="display:none;">
        <div id="messages">
            <p class="line">Life is better with you in it 🌸</p>
            <p class="line">Every conversation makes my day ☀️</p>
            <p class="line">To the person who is always there... 💖</p>
        </div>

        <h2 style="font-family: 'Playfair Display'; margin-top: 30px;">Best Friends Forever?</h2>

        <div class="btn-group">
            <button id="yesBtn" onclick="celebrate()">Yes, Always! ✨</button>
            <button id="noBtn" onmouseover="dodge()">No 🥺</button>
        </div>
    </div>

    <div id="celebration">
        <h1 style="font-size: 4rem;">🥳</h1>
        <h2 style="font-family: 'Playfair Display';">I knew it! ❤️</h2>
        <p>You just made my day, Neha!</p>
    </div>
</div>

<script>
    // Typing Effect
    const nameText = "For Neha ❤️";
    let charIdx = 0;
    function type() {
        if (charIdx < nameText.length) {
            document.getElementById("typing").innerHTML += nameText.charAt(charIdx);
            charIdx++;
            setTimeout(type, 150);
        }
    }
    type();

    function initiate() {
        // Play Music
        const music = document.getElementById("bgMusic");
        music.play().catch(() => console.log("Music play blocked by browser"));

        // Hide Open Button
        document.getElementById("openBtn").style.display = "none";
        document.getElementById("content").style.display = "block";

        // Fade in lines
        const lines = document.querySelectorAll('.line');
        lines.forEach((line, i) => {
            setTimeout(() => {
                line.style.opacity = "1";
                line.style.transform = "translateY(0)";
            }, i * 1200);
        });
    }

    function dodge() {
        const btn = document.getElementById("noBtn");
        const x = Math.random() * (window.innerWidth - btn.clientWidth);
        const y = Math.random() * (window.innerHeight - btn.clientHeight);
        btn.style.position = "fixed";
        btn.style.left = x + "px";
        btn.style.top = y + "px";
    }

    function celebrate() {
        document.getElementById("content").style.display = "none";
        document.getElementById("typing").style.display = "none";
        document.querySelector(".profile-img").style.display = "none";
        document.getElementById("celebration").style.display = "block";
        
        // Final heart explosion
        for(let i=0; i<50; i++) {
            setTimeout(spawnHeart, i * 50);
        }
    }

    function spawnHeart() {
        const heart = document.createElement("div");
        heart.innerHTML = ["❤️", "💖", "✨", "🌸", "⭐"][Math.floor(Math.random() * 5)];
        heart.style.position = "fixed";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.bottom = "-5vh";
        heart.style.fontSize = (Math.random() * 20 + 20) + "px";
        heart.style.zIndex = "1";
        heart.style.transition = `transform ${Math.random() * 2 + 3}s linear, opacity 3s`;
        
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.style.transform = `translateY(-110vh) translateX(${(Math.random() - 0.5) * 100}px)`;
            heart.style.opacity = "0";
        }, 100);

        setTimeout(() => heart.remove(), 5000);
    }

    // Continuous floating background
    setInterval(spawnHeart, 600);
</script>

</body>
</html>
